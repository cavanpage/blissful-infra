apiVersion: 1

datasources:
  - name: Jaeger
    type: jaeger
    access: proxy
    url: http://jaeger:16686
    uid: blissful-jaeger
    isDefault: false
    editable: false
    jsonData:
      tracesToLogsV2:
        datasourceUid: blissful-loki
        spanStartTimeShift: "-1h"
        spanEndTimeShift: "1h"
        filterByTraceID: true
