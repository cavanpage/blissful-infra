name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build -w packages/shared && npm run build -w packages/cli

      - name: Typecheck
        run: npm run typecheck -w packages/cli

  install-test:
    name: npm install test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install from npm
        run: npm install -g @blissful-infra/cli

      - name: Verify CLI works
        run: |
          VERSION=$(blissful-infra --version)
          echo "Installed version: $VERSION"
          echo "$VERSION" | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$'
